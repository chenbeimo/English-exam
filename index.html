<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>无道词典</title>
  <meta name="theme-color" content="#4A90D9">
  <script>
    (function () {
      var t = localStorage.getItem('vocab_theme') || 'auto';
      if (t === 'dark' || (t === 'auto' && matchMedia('(prefers-color-scheme:dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (t === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <!-- ====== 修改位置：音频解锁全屏遮罩 ====== -->
  <div id="audioLockOverlay" class="unlock-overlay">
    <div class="unlock-card">
      <span class="unlock-icon">🔊</span>
      <h2>点击进入学习</h2>
      <p>首次访问需轻触屏幕解锁音频</p>
      <p class="unlock-sub">解锁后可听到单词美式发音</p>
    </div>
  </div>

  <div id="app">
    <!-- 顶部导航 -->
    <header id="topBar">
      <span id="pageTitle">单词背诵</span>
      <button id="btnSettings" class="icon-btn" title="设置">⚙</button>
    </header>

    <!-- 主内容区 -->
    <main id="mainContent">
      <!-- ====== 首页 ====== -->
      <section id="view-home" class="view">
        <div class="stats-ring-container">
          <svg class="progress-ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fg" cx="60" cy="60" r="52" id="progressCircle"/>
          </svg>
          <div class="ring-text">
            <span class="ring-num" id="learnedCount">0</span>
            <span class="ring-label">/ 今日目标</span>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-num" id="streakDays">0</span>
            <span class="stat-label">连续打卡</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" id="accuracyRate">0%</span>
            <span class="stat-label">正确率</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" id="totalLearned">0</span>
            <span class="stat-label">累计学习</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" id="busuanzi_container_site_uv"><span id="busuanzi_value_site_uv">--</span></span>
            <span class="stat-label">全网访客</span>
          </div>
        </div>
        <div class="level-switch">
          <button class="level-btn" data-level="college">专升本</button>
          <button class="level-btn" data-level="primary">小学</button>
          <button class="level-btn" data-level="junior">初中</button>
          <button class="level-btn" data-level="senior">高中</button>
        </div>
        <div class="grade-switch" id="gradeSwitch">
          <!-- 动态生成 -->
        </div>
        <div class="home-actions">
          <button class="action-btn primary" data-nav="learn">开始学习</button>
          <div class="action-grid">
            <button class="action-btn" data-nav="quiz">测验模式</button>
            <button class="action-btn" data-nav="review">错题复习<span class="badge" id="wrongCount">0</span></button>
            <button class="action-btn" data-nav="wordbook">单词本<span class="badge" id="bookCount">0</span></button>
            <button class="action-btn" data-nav="spell">拼写模式</button>
          </div>
        </div>
      </section>

      <!-- ====== 学习模式 ====== -->
      <section id="view-learn" class="view" style="display:none">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="learnProgressBar"></div>
        </div>
        <span class="progress-text" id="learnProgressText">0 / 0</span>
        <div class="card-container" id="learnCard">
          <div class="card-inner">
            <div class="card-front">
              <span class="card-word" id="learnWord"></span>
              <span class="card-phonetic" id="learnPhonetic"></span>
              <button class="speak-btn with-label" id="learnSpeakBtn">🔊<span>点我听发音</span></button>
            </div>
            <div class="card-back">
              <span class="card-meaning" id="learnMeaning"></span>
              <span class="card-example" id="learnExample"></span>
              <span class="card-example-cn" id="learnExampleCn"></span>
            </div>
          </div>
        </div>
        <p class="tap-hint">点击卡片查看释义和例句</p>
        <div class="learn-btns">
          <button class="know-btn wrong" id="btnDontKnow">不认识</button>
          <button class="know-btn right" id="btnKnow">认识</button>
        </div>
      </section>

      <!-- ====== 测验模式 ====== -->
      <section id="view-quiz" class="view" style="display:none">
        <div class="quiz-header">
          <span class="quiz-progress" id="quizProgress">第 1 题</span>
          <span class="quiz-score" id="quizScore">正确: 0</span>
        </div>
        <div class="quiz-word-box">
          <span class="quiz-word" id="quizWord"></span>
          <button class="speak-btn with-label" id="quizSpeakBtn">🔊<span>点我听发音</span></button>
        </div>
        <div class="quiz-options" id="quizOptions">
          <!-- 动态生成4个选项 -->
        </div>
        <div class="quiz-feedback" id="quizFeedback" style="display:none"></div>
      </section>

      <!-- ====== 错题复习 ====== -->
      <section id="view-review" class="view" style="display:none">
        <div class="list-header">
          <span>错题本</span>
          <span id="reviewCount">0 个单词</span>
        </div>
        <div class="word-list" id="reviewList">
          <p class="empty-tip">暂无错词，继续保持！</p>
        </div>
      </section>

      <!-- ====== 单词本 ====== -->
      <section id="view-wordbook" class="view" style="display:none">
        <div class="list-header">
          <span>单词本</span>
          <span id="bookHeaderCount">0 个单词</span>
        </div>
        <div class="word-list" id="wordbookList">
          <p class="empty-tip">还没有收藏单词</p>
        </div>
      </section>

      <!-- ====== 拼写模式 ====== -->
      <section id="view-spell" class="view" style="display:none">
        <div class="spell-header">
          <span class="spell-progress" id="spellProgress">第 1 词</span>
          <span class="spell-score" id="spellScore">正确: 0</span>
        </div>
        <div class="spell-word-box">
          <button class="speak-btn large" id="spellSpeakBtn">🔊 戳我听发音</button>
        </div>
        <div class="spell-input-wrap">
          <input type="text" id="spellInput" class="spell-input" placeholder="输入你听到的单词..." autocomplete="off" autocapitalize="off">
          <button class="action-btn primary" id="spellSubmit">提交</button>
        </div>
        <div class="spell-feedback" id="spellFeedback" style="display:none"></div>
      </section>
    </main>

    <!-- 底部导航 -->
    <nav id="bottomNav">
      <button class="nav-btn active" data-nav="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">首页</span>
      </button>
      <button class="nav-btn" data-nav="learn">
        <span class="nav-icon">📖</span>
        <span class="nav-label">学习</span>
      </button>
      <button class="nav-btn" data-nav="quiz">
        <span class="nav-icon">✏️</span>
        <span class="nav-label">测验</span>
      </button>
      <button class="nav-btn" data-nav="review">
        <span class="nav-icon">📝</span>
        <span class="nav-label">复习</span>
      </button>
      <button class="nav-btn" data-nav="wordbook">
        <span class="nav-icon">⭐</span>
        <span class="nav-label">单词本</span>
      </button>
    </nav>

    <!-- 设置弹窗 -->
    <div id="settingsOverlay" class="overlay" style="display:none">
      <div class="modal">
        <h3>设置</h3>
        <div class="setting-item">
          <label>每日目标（词）</label>
          <input type="number" id="settingGoal" min="10" max="200" step="10">
        </div>
        <div class="setting-item">
          <label>发音语速</label>
          <input type="range" id="settingRate" min="0.6" max="1.2" step="0.1">
          <span id="settingRateVal">0.9</span>
        </div>
        <div class="setting-item">
          <label>主题</label>
          <div class="theme-switch" id="themeSwitch">
            <button class="theme-opt" data-theme="auto">自动</button>
            <button class="theme-opt" data-theme="light">浅色</button>
            <button class="theme-opt" data-theme="dark">深色</button>
          </div>
        </div>
        <div class="modal-btns">
          <button class="action-btn" id="btnResetData">重置进度</button>
          <button class="action-btn primary" id="btnCloseSettings">关闭</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none"></div>
  </div>

  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  <script defer src="js/wordData.js"></script>
  <script defer src="js/storage.js"></script>
  <script defer src="js/tts.js"></script>
  <script defer src="js/quiz.js"></script>
  <script defer src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    }
  </script>
</body>
</html>
